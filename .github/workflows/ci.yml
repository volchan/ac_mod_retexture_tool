name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bunx vue-tsc --noEmit

      - name: Lint
        run: bunx biome check .

      - name: Test
        run: bun run vitest run

  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Create sidecar stubs
        run: |
          mkdir -p src-tauri/binaries src-tauri/resources/models
          touch src-tauri/binaries/upscayl-bin-x86_64-unknown-linux-gnu
          touch src-tauri/resources/models/RealESRGAN_General_x4_v3.bin
          touch src-tauri/resources/models/RealESRGAN_General_x4_v3.param
          touch src-tauri/resources/models/realesr-animevideov3-x4.bin
          touch src-tauri/resources/models/realesr-animevideov3-x4.param
          touch src-tauri/resources/models/4xLSDIRCompactC3.bin
          touch src-tauri/resources/models/4xLSDIRCompactC3.param
          touch src-tauri/resources/models/4xNomos8kSC.bin
          touch src-tauri/resources/models/4xNomos8kSC.param
          touch src-tauri/resources/models/4x_NMKD-Siax_200k.bin
          touch src-tauri/resources/models/4x_NMKD-Siax_200k.param

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test
