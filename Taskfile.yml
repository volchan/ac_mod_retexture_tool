version: "3"

vars:
  TAURI_DIR: src-tauri

tasks:
  dev:
    desc: Start Tauri dev server
    cmd: bun run tauri dev

  build:
    desc: Build production binaries
    cmd: bun run tauri build

  # --- Linting ---

  lint:
    desc: Lint frontend and backend
    deps: [lint:frontend, lint:backend]

  lint:frontend:
    desc: Lint frontend with Biome
    cmd: bunx biome check .

  lint:backend:
    desc: Lint Rust with Clippy
    dir: "{{.TAURI_DIR}}"
    cmd: cargo clippy -- -D warnings

  # --- Formatting ---

  format:
    desc: Format frontend and backend
    deps: [format:frontend, format:backend]

  format:frontend:
    desc: Format frontend with Biome
    cmd: bunx biome check --write .

  format:backend:
    desc: Format Rust with rustfmt
    dir: "{{.TAURI_DIR}}"
    cmd: cargo fmt

  # --- Testing ---

  test:
    desc: Run all tests
    deps: [test:frontend, test:backend]

  test:frontend:
    desc: Run frontend tests
    cmd: bunx vitest run

  test:backend:
    desc: Run Rust tests
    dir: "{{.TAURI_DIR}}"
    cmd: cargo test

  test:watch:
    desc: Run frontend tests in watch mode
    cmd: bunx vitest

  test:coverage:
    desc: Run all tests with coverage reports
    cmds:
      - bunx vitest run --coverage
      - cd {{.TAURI_DIR}} && cargo tarpaulin --out html

  set-version:
    desc: Set app version from tag (e.g. task set-version -- v0.2.0)
    cmd: bun scripts/set-version.ts {{.CLI_ARGS}}

  # --- Setup ---

  setup:realesrgan:
    desc: Download Real-ESRGAN ncnn-Vulkan binary and models for the current platform
    vars:
      TRIPLE:
        sh: rustc -vV | awk '/^host:/ { print $2 }'
      VERSION: v0.2.5.1
      BASE_URL: https://github.com/xinntao/Real-ESRGAN-ncnn-vulkan/releases/download/{{.VERSION}}
    cmds:
      - |
        case "$(uname -s)" in
          Darwin)  ZIP="realesrgan-ncnn-vulkan-{{.VERSION}}-macos.zip" ;;
          Linux)   ZIP="realesrgan-ncnn-vulkan-{{.VERSION}}-ubuntu.zip" ;;
          MINGW*|MSYS*|CYGWIN*) ZIP="realesrgan-ncnn-vulkan-{{.VERSION}}-windows.zip" ;;
          *) echo "Unsupported OS" && exit 1 ;;
        esac
        DEST={{.TAURI_DIR}}/binaries
        RES={{.TAURI_DIR}}/resources/models
        mkdir -p "$DEST" "$RES"
        TMP=$(mktemp -d)
        echo "Downloading $ZIP..."
        curl -L "{{.BASE_URL}}/$ZIP" -o "$TMP/$ZIP"
        unzip -o "$TMP/$ZIP" -d "$TMP/out"
        case "$(uname -s)" in
          Darwin)
            cp "$TMP/out/realesrgan-ncnn-vulkan" "$DEST/realesrgan-ncnn-vulkan-{{.TRIPLE}}"
            chmod +x "$DEST/realesrgan-ncnn-vulkan-{{.TRIPLE}}"
            ;;
          Linux)
            cp "$TMP/out/realesrgan-ncnn-vulkan" "$DEST/realesrgan-ncnn-vulkan-{{.TRIPLE}}"
            chmod +x "$DEST/realesrgan-ncnn-vulkan-{{.TRIPLE}}"
            ;;
          *)
            cp "$TMP/out/realesrgan-ncnn-vulkan.exe" "$DEST/realesrgan-ncnn-vulkan-{{.TRIPLE}}.exe"
            ;;
        esac
        cp "$TMP/out/"*.bin "$RES/" 2>/dev/null || true
        cp "$TMP/out/"*.param "$RES/" 2>/dev/null || true
        rm -rf "$TMP"
        echo "Real-ESRGAN installed successfully."

  # --- Utilities ---

  ui:add:
    desc: Add a shadcn-vue component
    cmd: bunx shadcn-vue@latest add {{.CLI_ARGS}}

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist
      - cd {{.TAURI_DIR}} && cargo clean

  check:
    desc: Full check — format, lint, test
    cmds:
      - task: format
      - task: lint
      - task: test