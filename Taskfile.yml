version: "3"

vars:
  TAURI_DIR: src-tauri

tasks:
  dev:
    desc: Start Tauri dev server
    cmd: bun run tauri dev

  build:
    desc: Build production binaries
    cmd: bun run tauri build

  # --- Linting ---

  lint:
    desc: Lint frontend and backend
    deps: [lint:frontend, lint:backend]

  lint:frontend:
    desc: Lint frontend with Biome
    cmd: bunx biome check .

  lint:backend:
    desc: Lint Rust with Clippy
    dir: "{{.TAURI_DIR}}"
    cmd: cargo clippy -- -D warnings

  # --- Formatting ---

  format:
    desc: Format frontend and backend
    deps: [format:frontend, format:backend]

  format:frontend:
    desc: Format frontend with Biome
    cmd: bunx biome check --write .

  format:backend:
    desc: Format Rust with rustfmt
    dir: "{{.TAURI_DIR}}"
    cmd: cargo fmt

  # --- Testing ---

  test:
    desc: Run all tests
    deps: [test:frontend, test:backend]

  test:frontend:
    desc: Run frontend tests
    cmd: bunx vitest run

  test:backend:
    desc: Run Rust tests
    dir: "{{.TAURI_DIR}}"
    cmd: cargo test

  test:watch:
    desc: Run frontend tests in watch mode
    cmd: bunx vitest

  test:coverage:
    desc: Run all tests with coverage reports
    cmds:
      - bunx vitest run --coverage
      - cd {{.TAURI_DIR}} && cargo tarpaulin --out html

  set-version:
    desc: Set app version from tag (e.g. task set-version -- v0.2.0)
    cmd: bun scripts/set-version.ts {{.CLI_ARGS}}

  # --- Setup ---

  setup:enhance:
    desc: Download latest upscayl-bin and models for the current platform
    vars:
      TRIPLE:
        sh: rustc -vV | awk '/^host:/ { print $2 }'
    cmds:
      - |
        case "$(uname -s)" in
          Darwin)  PLATFORM="macos" ;;
          Linux)   PLATFORM="linux" ;;
          MINGW*|MSYS*|CYGWIN*|Windows_NT) PLATFORM="windows" ;;
          *) echo "Unsupported OS" && exit 1 ;;
        esac
        VERSION=$(curl -fsSIL "https://github.com/upscayl/upscayl-ncnn/releases/latest" | grep -i '^location:' | sed 's|.*/tag/||' | tr -d '[:space:]')
        if [ -z "$VERSION" ]; then
          echo "error: failed to determine latest upscayl-ncnn version" >&2
          exit 1
        fi
        echo "Latest upscayl-ncnn: $VERSION"
        ZIP="upscayl-bin-${VERSION}-${PLATFORM}.zip"
        BASE_URL="https://github.com/upscayl/upscayl-ncnn/releases/download/${VERSION}"
        DEST={{.TAURI_DIR}}/binaries
        RES={{.TAURI_DIR}}/resources/models
        mkdir -p "$DEST" "$RES"
        TMP=$(mktemp -d)
        trap 'rm -rf "$TMP"' EXIT
        echo "Downloading $ZIP..."
        curl -fL "${BASE_URL}/$ZIP" -o "$TMP/$ZIP"
        unzip -o "$TMP/$ZIP" -d "$TMP/out"
        case "$(uname -s)" in
          Darwin|Linux)
            BIN=$(find "$TMP/out" -name "upscayl-bin" -not -name "*.exe" | head -1)
            if [ -z "$BIN" ]; then
              echo "error: upscayl-bin not found in archive" >&2
              rm -rf "$TMP"
              exit 1
            fi
            cp "$BIN" "$DEST/upscayl-bin-{{.TRIPLE}}"
            chmod +x "$DEST/upscayl-bin-{{.TRIPLE}}"
            ;;
          *)
            BIN=$(find "$TMP/out" -name "upscayl-bin.exe" | head -1)
            if [ -z "$BIN" ]; then
              echo "error: upscayl-bin.exe not found in archive" >&2
              rm -rf "$TMP"
              exit 1
            fi
            cp "$BIN" "$DEST/upscayl-bin-{{.TRIPLE}}.exe"
            ;;
        esac
        echo "Downloading models..."
        MODELS_BASE="https://raw.githubusercontent.com/upscayl/custom-models/main/models"
        for MODEL in "RealESRGAN_General_x4_v3" "realesr-animevideov3-x4" "4xLSDIRCompactC3" "4xNomos8kSC" "4x_NMKD-Siax_200k"; do
          curl -fL "${MODELS_BASE}/${MODEL}.param" -o "$RES/${MODEL}.param" || { echo "error: failed to download ${MODEL}.param" >&2; exit 1; }
          curl -fL "${MODELS_BASE}/${MODEL}.bin" -o "$RES/${MODEL}.bin" || { echo "error: failed to download ${MODEL}.bin" >&2; exit 1; }
        done
        rm -rf "$TMP"
        echo "upscayl-bin installed successfully."

  setup:enhance:windows:
    desc: Download upscayl-bin and models for Windows
    cmd: powershell -ExecutionPolicy Bypass -File scripts/setup-enhance-windows.ps1

  # --- Utilities ---

  ui:add:
    desc: Add a shadcn-vue component
    cmd: bunx shadcn-vue@latest add {{.CLI_ARGS}}

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist
      - cd {{.TAURI_DIR}} && cargo clean

  check:
    desc: Full check — format, lint, test
    cmds:
      - task: format
      - task: lint
      - task: test

  # --- Releases ---

  release:create:
    desc: "Create a GitHub release. Args: TAG (e.g. v1.2.0) BRANCH (default: main) PRERELEASE (true/false, default: false)"
    vars:
      TAG: '{{.TAG}}'
      BRANCH: '{{default "main" .BRANCH}}'
      PRERELEASE: '{{default "false" .PRERELEASE}}'
    preconditions:
      - sh: '[ -n "{{.TAG}}" ]'
        msg: "TAG is required. Usage: task release:create TAG=v1.2.0 [BRANCH=main] [PRERELEASE=true]"
    cmds:
      - git tag {{.TAG}} origin/{{.BRANCH}}
      - git push origin {{.TAG}}
      - |
        PRERELEASE_FLAG=""
        if [ "{{.PRERELEASE}}" = "true" ]; then
          PRERELEASE_FLAG="--prerelease"
        fi
        gh release create {{.TAG}} \
          --title "{{.TAG}}" \
          --target {{.BRANCH}} \
          --generate-notes \
          $PRERELEASE_FLAG
        echo "Release {{.TAG}} created on branch {{.BRANCH}}"

  release:delete:
    desc: "Delete a GitHub release and its tag. Args: TAG (e.g. v1.2.0)"
    vars:
      TAG: '{{.TAG}}'
    preconditions:
      - sh: '[ -n "{{.TAG}}" ]'
        msg: "TAG is required. Usage: task release:delete TAG=v1.2.0"
    cmds:
      - gh release delete {{.TAG}} --yes --cleanup-tag
      - echo "Release and tag {{.TAG}} deleted"