<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AC Mod Toolkit</title>
    <script>
      ;(() => {
        var mode = localStorage.getItem('theme-mode')
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (mode === 'dark' || (mode !== 'light' && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        z-index: 9999;
        transition: opacity 0.2s ease;
        font-family: Inter, system-ui, sans-serif;
      }
      html.dark #splash { background: #36393f; }
      .splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .splash-icon {
        width: 64px;
        height: 64px;
        border-radius: 12px;
      }
      .splash-name {
        font-size: 13px;
        font-weight: 600;
        color: #181818;
        letter-spacing: 0.01em;
      }
      html.dark .splash-name { color: #dbdee1; }
      .splash-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid #e5e5e5;
        border-top-color: #181818;
        border-radius: 50%;
        animation: splash-spin 0.7s linear infinite;
      }
      html.dark .splash-spinner {
        border-color: #40444b;
        border-top-color: #dbdee1;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-inner">
        <img src="/icon.png" class="splash-icon" alt="" />
        <span class="splash-name">AC Mod Retexture Tool</span>
        <div class="splash-spinner"></div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
